<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Call - Sovereign Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="video-page">
  <div class="video-shell">
    <div id="incomingBanner" class="incoming-banner hidden">
      <span id="incomingText">Incoming call...</span>
      <div class="incoming-actions">
        <button id="acceptCallBtn" class="chat-send-btn" type="button">Accept</button>
        <button id="declineCallBtn" class="danger-btn" type="button">Decline</button>
      </div>
    </div>
    <div id="callStatus" class="video-status">Preparing call...</div>

    <main class="video-stage">
      <section class="video-card video-remote">
        <div class="video-overlay top">
          <span id="remoteLabel">Remote</span>
          <span id="connectionBadge" class="video-badge">Idle</span>
          <span id="timerBadge" class="video-badge">00:00</span>
          <button id="fullscreenBtn" class="secondary-btn" type="button">Fullscreen</button>
        </div>
        <video id="remoteVideo" autoplay playsinline></video>
        <div id="remoteEmpty" class="video-empty">Waiting for remote video...</div>
      </section>

      <aside class="video-card video-local">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-overlay">
          <span>You</span>
          <span id="localMediaState">Mic on . Cam on</span>
        </div>
      </aside>
    </main>

    <footer class="video-controls">
      <button id="startCallBtn" class="chat-send-btn video-control-btn" type="button">Start</button>
      <button id="muteBtn" class="secondary-btn video-control-btn" type="button">Mic On</button>
      <button id="cameraBtn" class="secondary-btn video-control-btn" type="button">Cam On</button>
      <button id="endCallBtn" class="danger-btn video-control-btn end" type="button">End</button>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="auth.js"></script>
  <script src="video.js"></script>
</body>
</html>
